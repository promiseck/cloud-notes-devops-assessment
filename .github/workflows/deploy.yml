name: Test, Build, and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-2
  TF_VAR_project_name: cloud-notes
  TF_VAR_environment: dev

jobs:
  test:
    name: Run application tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt
        working-directory: devops-aws-fastapi-project

      - name: Run tests
        run: pytest
        working-directory: devops-aws-fastapi-project

  deploy:
    name: Build image and apply Terraform
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init
        working-directory: devops-aws-fastapi-project/terraform

      - name: Create ECR repository first
        run: terraform apply -auto-approve -target=aws_ecr_repository.app
        working-directory: devops-aws-fastapi-project/terraform

      - name: Read ECR repository URL
        id: ecr
        run: echo "repo=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
        working-directory: devops-aws-fastapi-project/terraform

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE="${{ steps.ecr.outputs.repo }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "TF_VAR_container_image=$IMAGE" >> "$GITHUB_ENV"
        working-directory: devops-aws-fastapi-project

      - name: Terraform format check
        run: terraform fmt -check
        working-directory: devops-aws-fastapi-project/terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: devops-aws-fastapi-project/terraform

      - name: Deploy infrastructure and app
        run: terraform apply -auto-approve
        working-directory: devops-aws-fastapi-project/terraform
